name: Daily Insight

on:
  workflow_dispatch:
  schedule:
    # 04:37 UTC = 10:07 AM IST. Non-round minute avoids GitHub peak queues.
    - cron: "37 4 * * *"

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: "Websites/binaryventures.in V2/package-lock.json"

      - name: Install dependencies
        working-directory: "Websites/binaryventures.in V2"
        run: npm ci

      - name: Generate article
        working-directory: "Websites/binaryventures.in V2"
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/generate-insight-article.mjs

      - name: Build
        working-directory: "Websites/binaryventures.in V2"
        run: npm run build

      - name: Commit generated article
        working-directory: "Websites/binaryventures.in V2"
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/insights/articles/
          git diff --cached --quiet || git commit -m "content(insights): add generated article [skip ci]"

      - name: Push
        run: git push

      - name: Deploy to Firebase
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: binaryventures-in
          entryPoint: "Websites/binaryventures.in V2"
