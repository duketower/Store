name: Firebase Deploy

on:
  push:
    branches:
      - main
    paths:
      - "Websites/binaryventures.in V2/**"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: "Websites/binaryventures.in V2/package-lock.json"

      - name: Install dependencies
        working-directory: "Websites/binaryventures.in V2"
        run: npm ci

      - name: Build
        working-directory: "Websites/binaryventures.in V2"
        run: npm run build

      - name: Deploy to Firebase
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: binaryventures-in
          entryPoint: "Websites/binaryventures.in V2"
