name: Generate Insight Draft

on:
  workflow_dispatch:
  schedule:
    # Poll every 5 minutes so Notion approvals are picked up quickly.
    - cron: "*/5 * * * *"

concurrency:
  group: generate-insight-draft
  cancel-in-progress: false

jobs:
  generate-draft:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: "Websites/binaryventures.in V2/package-lock.json"

      - name: Install dependencies
        working-directory: "Websites/binaryventures.in V2"
        run: npm ci

      - name: Generate approved topic draft
        working-directory: "Websites/binaryventures.in V2"
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/generate-insight-article.mjs

      - name: Detect generated draft changes
        id: detect
        working-directory: "Websites/binaryventures.in V2"
        run: |
          if git diff --quiet -- src/content/insights/articles/; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        if: steps.detect.outputs.has_changes == 'true'
        working-directory: "Websites/binaryventures.in V2"
        run: npm run build

      - name: Commit generated draft
        if: steps.detect.outputs.has_changes == 'true'
        working-directory: "Websites/binaryventures.in V2"
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/insights/articles/
          git diff --cached --quiet || git commit -m "content(insights): add generated draft"

      - name: Push
        if: steps.detect.outputs.has_changes == 'true'
        run: git push
