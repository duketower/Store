name: Find Insight Trends

on:
  workflow_dispatch:
  schedule:
    # 03:07 UTC = 08:37 AM IST. Finds topics before the daily draft generator.
    - cron: "7 3 * * *"

jobs:
  find-trends:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: "Websites/binaryventures.in V2/package-lock.json"

      - name: Install dependencies
        working-directory: "Websites/binaryventures.in V2"
        run: npm ci

      - name: Find trend-backed topics
        working-directory: "Websites/binaryventures.in V2"
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/find-insight-trends.mjs
